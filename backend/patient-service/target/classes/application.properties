spring.application.name=patient-service

# MongoDB Configuration
# Atlas URI:
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb+srv://db_user:db_user123@cluster0.1bnkaaw.mongodb.net/mediconnect_patient_db?retryWrites=true&w=majority&appName=Cluster0}
# Local Fallback (if Atlas is unreachable):
# spring.data.mongodb.uri=mongodb://localhost:27017/mediconnect_patient_db

# Prevent long hangs on startup (in milliseconds)
spring.data.mongodb.connect-timeout=5000
spring.data.mongodb.socket-timeout=5000

# Server Configuration
server.port=${SERVER_PORT:8081}

# MongoDB Configuration
spring.data.mongodb.auto-index-creation=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom Properties
upload.path=${UPLOAD_PATH:./uploads/reports}

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
