<div class="h-screen bg-slate-900 flex flex-col overflow-hidden">
  <div class="h-16 bg-slate-800 border-b border-slate-700 flex items-center justify-between px-6 z-10">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 text-white font-bold text-lg">
        <span class="h-3 w-3 bg-emerald-500 rounded-full animate-pulse"></span>
        Consultation Room
      </div>

      <div class="h-6 w-px bg-slate-600"></div>

      <div class="flex items-center gap-2 text-slate-300 text-sm font-medium">
        <lucide-icon [img]="ClockIcon" class="h-4 w-4"></lucide-icon>
        14:23
      </div>
    </div>

    <div class="flex items-center gap-3">
      <span class="bg-slate-700 text-slate-300 px-3 py-1 rounded-full text-xs font-medium">
        Encrypted Call
      </span>
    </div>
  </div>

  <div class="flex-1 flex overflow-hidden relative">
    <div
      class="flex-1 flex flex-col p-4 gap-4 transition-all duration-300"
      [ngClass]="isSidebarOpen ? 'mr-80' : ''"
    >
      <div class="flex-1 bg-slate-800 rounded-2xl overflow-hidden relative border border-slate-700 shadow-2xl flex items-center justify-center">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1559839734-2b71ea197ec2?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80')] bg-cover bg-center opacity-80"></div>

        <div class="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md px-4 py-2 rounded-xl text-white font-medium flex items-center gap-2 border border-white/10">
          Dr. Sarah Smith
          <lucide-icon [img]="MicIcon" class="h-4 w-4 text-emerald-400"></lucide-icon>
        </div>
      </div>

      <div class="absolute bottom-24 right-6 w-48 h-32 bg-slate-800 rounded-xl overflow-hidden border-2 border-slate-600 shadow-xl z-20 flex items-center justify-center">
        <ng-container *ngIf="isVideoOff; else selfVideo">
          <div class="h-12 w-12 rounded-full bg-slate-700 flex items-center justify-center">
            <lucide-icon [img]="UserIcon" class="h-6 w-6 text-slate-400"></lucide-icon>
          </div>
        </ng-container>

        <ng-template #selfVideo>
          <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80')] bg-cover bg-center"></div>
        </ng-template>

        <div class="absolute bottom-2 left-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded-md text-white text-xs font-medium border border-white/10">
          You {{ isMuted ? '(Muted)' : '' }}
        </div>
      </div>
    </div>

    <div
      class="absolute top-0 right-0 bottom-0 w-80 bg-white border-l border-slate-200 transition-transform duration-300 z-20 flex flex-col"
      [ngClass]="isSidebarOpen ? 'translate-x-0' : 'translate-x-full'"
    >
      <div class="flex border-b border-slate-200">
        <button
          type="button"
          (click)="setActiveTab('chat')"
          class="flex-1 py-4 text-sm font-bold transition-colors border-b-2"
          [ngClass]="activeTab === 'chat'
            ? 'border-medical-600 text-medical-600 bg-medical-50/50'
            : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'"
        >
          Chat
        </button>

        <button
          type="button"
          (click)="setActiveTab('notes')"
          class="flex-1 py-4 text-sm font-bold transition-colors border-b-2"
          [ngClass]="activeTab === 'notes'
            ? 'border-medical-600 text-medical-600 bg-medical-50/50'
            : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'"
        >
          Notes
        </button>
      </div>

      <ng-container *ngIf="activeTab === 'chat'; else notesTab">
        <div class="flex-1 flex flex-col">
          <div class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50">
            <div class="text-center text-xs text-slate-400 my-2">
              Consultation started at 14:00
            </div>

            <div class="flex flex-col items-start">
              <span class="text-xs text-slate-500 ml-1 mb-1">
                Dr. Sarah Smith
              </span>
              <div class="bg-white border border-slate-200 p-3 rounded-2xl rounded-tl-sm shadow-sm text-sm text-slate-700 max-w-[85%]">
                Hello! How are you feeling today?
              </div>
              <span class="text-[10px] text-slate-400 mt-1 ml-1">
                14:02
              </span>
            </div>

            <div class="flex flex-col items-end">
              <span class="text-xs text-slate-500 mr-1 mb-1">You</span>
              <div class="bg-medical-600 text-white p-3 rounded-2xl rounded-tr-sm shadow-sm text-sm max-w-[85%]">
                Hi Doctor. I've been experiencing some mild chest pain since
                yesterday.
              </div>
              <span class="text-[10px] text-slate-400 mt-1 mr-1">
                14:03
              </span>
            </div>
          </div>

          <div class="p-4 border-t border-slate-200 bg-white">
            <div class="relative">
              <input
                type="text"
                placeholder="Type a message..."
                class="w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-sm"
              />

              <button
                type="button"
                class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-medical-600 hover:bg-medical-50 rounded-lg transition-colors"
              >
                <svg
                  class="h-5 w-5 transform rotate-90"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </ng-container>

      <ng-template #notesTab>
        <div class="flex-1 flex flex-col p-4 bg-slate-50">
          <textarea
            class="flex-1 w-full p-4 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-sm resize-none shadow-sm"
            placeholder="Take private notes during the consultation..."
          ></textarea>

          <button
            type="button"
            class="mt-4 w-full bg-slate-900 text-white py-3 rounded-xl font-medium hover:bg-slate-800 transition-colors shadow-sm text-sm"
          >
            Save Notes
          </button>
        </div>
      </ng-template>
    </div>
  </div>

  <div class="h-20 bg-slate-900 border-t border-slate-800 flex items-center justify-center gap-4 px-6 z-30 relative">
    <button
      type="button"
      (click)="toggleMute()"
      class="h-12 w-12 rounded-full flex items-center justify-center transition-colors"
      [ngClass]="isMuted ? 'bg-rose-500 text-white' : 'bg-slate-700 text-white hover:bg-slate-600'"
    >
      <lucide-icon
        [img]="isMuted ? MicOffIcon : MicIcon"
        class="h-5 w-5"
      ></lucide-icon>
    </button>

    <button
      type="button"
      (click)="toggleVideo()"
      class="h-12 w-12 rounded-full flex items-center justify-center transition-colors"
      [ngClass]="isVideoOff ? 'bg-rose-500 text-white' : 'bg-slate-700 text-white hover:bg-slate-600'"
    >
      <lucide-icon
        [img]="isVideoOff ? VideoOffIcon : VideoIcon"
        class="h-5 w-5"
      ></lucide-icon>
    </button>

    <button
      type="button"
      class="h-12 w-24 rounded-full flex items-center justify-center bg-rose-600 text-white hover:bg-rose-700 transition-colors shadow-lg shadow-rose-900/50 ml-4 font-medium gap-2"
    >
      <lucide-icon [img]="PhoneOffIcon" class="h-5 w-5"></lucide-icon>
      End
    </button>

    <div class="absolute right-6 flex items-center gap-4">
      <button
        type="button"
        (click)="toggleSidebar()"
        class="h-10 w-10 rounded-full flex items-center justify-center transition-colors"
        [ngClass]="isSidebarOpen
          ? 'bg-medical-600 text-white'
          : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white border border-slate-700'"
      >
        <lucide-icon [img]="MessageSquareIcon" class="h-5 w-5"></lucide-icon>
      </button>

      <button
        type="button"
        class="h-10 w-10 rounded-full flex items-center justify-center bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white transition-colors border border-slate-700"
      >
        <lucide-icon [img]="SettingsIcon" class="h-5 w-5"></lucide-icon>
      </button>
    </div>
  </div>
</div>
