<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Doctor Verification</h1>
    <p class="text-slate-500 text-sm mt-1">Review submitted credentials and approve or reject doctor registrations.</p>
  </div>

  <div class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden">
    <div class="p-6 border-b border-slate-100 flex items-center gap-3">
      <lucide-icon [img]="ShieldCheckIcon" class="h-5 w-5 text-medical-600"></lucide-icon>
      <h2 class="text-lg font-bold text-slate-900">Verification Queue</h2>
    </div>

    <div class="divide-y divide-slate-100">
      <div *ngFor="let item of queue" class="p-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4 hover:bg-slate-50/50 transition-colors">
        <div>
          <h3 class="font-bold text-slate-900">Dr. {{ item.firstName }} {{ item.lastName }}</h3>
          <p class="text-sm text-slate-500">{{ item.specialization }}</p>
          <p class="text-xs text-slate-400 mt-1">Submitted: {{ item.id ? 'Recently' : 'Unknown' }}</p>
        </div>

        <div class="flex items-center gap-3">
          <button class="border border-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors flex items-center gap-2">
            <lucide-icon [img]="EyeIcon" class="h-4 w-4"></lucide-icon>
            View Documents
          </button>

          <button class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-emerald-700 transition-colors flex items-center gap-2">
            <lucide-icon [img]="CheckCircle2Icon" class="h-4 w-4"></lucide-icon>
            Approve
          </button>

          <button class="bg-rose-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-rose-700 transition-colors flex items-center gap-2">
            <lucide-icon [img]="XCircleIcon" class="h-4 w-4"></lucide-icon>
            Reject
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
