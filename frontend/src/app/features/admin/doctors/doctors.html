<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Manage Doctors</h1>
    <p class="text-slate-500 text-sm mt-1">View registered doctors and monitor verification status.</p>
  </div>

  <div class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden">
    <div class="p-4 border-b border-slate-100">
      <div class="relative max-w-sm">
        <lucide-icon [img]="SearchIcon" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400"></lucide-icon>
        <input type="text" placeholder="Search doctors..." class="w-full pl-12 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-medical-500" />
      </div>
    </div>

    <div class="divide-y divide-slate-100">
      <div *ngFor="let d of doctors" class="p-6 flex items-center justify-between gap-4 hover:bg-slate-50/50 transition-colors">
        <div class="flex items-center gap-4">
          <div class="h-12 w-12 rounded-full bg-slate-100 text-slate-700 flex items-center justify-center border border-slate-200">
            <lucide-icon [img]="StethoscopeIcon" class="h-5 w-5"></lucide-icon>
          </div>
          <div>
            <h3 class="font-bold text-slate-900">{{ d.name }}</h3>
            <p class="text-sm text-slate-500">{{ d.specialty }} • {{ d.hospital }}</p>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-semibold"
            [ngClass]="d.status === 'verified' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'">
            <lucide-icon [img]="ShieldCheckIcon" class="h-3 w-3"></lucide-icon>
            {{ d.status }}
          </span>
          <button class="border border-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">
            View
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
