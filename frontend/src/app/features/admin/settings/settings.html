<div class="max-w-4xl space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Admin Settings</h1>
    <p class="text-slate-500 text-sm mt-1">
      Configure platform preferences, notifications, and security controls.
    </p>
  </div>

  <div class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden">
    <div class="p-6 border-b border-slate-100">
      <h2 class="text-lg font-bold text-slate-900">Platform Preferences</h2>
    </div>

    <div class="p-6 space-y-8">
      <div>
        <div class="flex items-center gap-3 mb-3">
          <lucide-icon [img]="BellIcon" class="h-5 w-5 text-medical-600"></lucide-icon>
          <h3 class="font-bold text-slate-900">Notifications</h3>
        </div>
        <div class="space-y-3">
          <label class="flex items-center justify-between p-4 border border-slate-200 rounded-xl">
            <span class="text-sm font-medium text-slate-700">Email alerts for verification requests</span>
            <input type="checkbox" checked class="h-4 w-4 text-medical-600" />
          </label>
          <label class="flex items-center justify-between p-4 border border-slate-200 rounded-xl">
            <span class="text-sm font-medium text-slate-700">Payment failure alerts</span>
            <input type="checkbox" checked class="h-4 w-4 text-medical-600" />
          </label>
        </div>
      </div>

      <div>
        <div class="flex items-center gap-3 mb-3">
          <lucide-icon [img]="ShieldCheckIcon" class="h-5 w-5 text-medical-600"></lucide-icon>
          <h3 class="font-bold text-slate-900">Security</h3>
        </div>
        <div class="space-y-3">
          <label class="flex items-center justify-between p-4 border border-slate-200 rounded-xl">
            <span class="text-sm font-medium text-slate-700">Require 2FA for admins</span>
            <input type="checkbox" class="h-4 w-4 text-medical-600" />
          </label>
          <label class="flex items-center justify-between p-4 border border-slate-200 rounded-xl">
            <span class="text-sm font-medium text-slate-700">Audit high-risk actions</span>
            <input type="checkbox" checked class="h-4 w-4 text-medical-600" />
          </label>
        </div>
      </div>

      <div>
        <div class="flex items-center gap-3 mb-3">
          <lucide-icon [img]="LockIcon" class="h-5 w-5 text-medical-600"></lucide-icon>
          <h3 class="font-bold text-slate-900">Session Controls</h3>
        </div>
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Session Timeout</label>
            <select class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-slate-700">
              <option>15 minutes</option>
              <option selected>30 minutes</option>
              <option>1 hour</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Default Locale</label>
            <select class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-slate-700">
              <option selected>English</option>
              <option>Sinhala</option>
              <option>Tamil</option>
            </select>
          </div>
        </div>
      </div>

      <div class="pt-2 flex justify-end">
        <button
          type="button"
          class="bg-medical-600 text-white px-6 py-2.5 rounded-xl font-medium hover:bg-medical-700 transition-colors shadow-sm flex items-center gap-2"
        >
          <lucide-icon [img]="SaveIcon" class="h-4 w-4"></lucide-icon>
          Save Settings
        </button>
      </div>
    </div>
  </div>
</div>
