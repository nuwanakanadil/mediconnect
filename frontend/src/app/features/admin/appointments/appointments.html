<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Appointments Management</h1>
    <p class="text-slate-500 text-sm mt-1">
      Monitor all bookings, consultation types, and appointment statuses.
    </p>
  </div>

  <div class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden">
    <div class="p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="relative w-full sm:w-72">
        <lucide-icon
          [img]="SearchIcon"
          class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400"
        ></lucide-icon>
        <input
          type="text"
          placeholder="Search appointments..."
          class="w-full pl-12 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-medical-500"
        />
      </div>

      <button class="flex items-center gap-2 border border-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">
        <lucide-icon [img]="FilterIcon" class="h-4 w-4"></lucide-icon>
        Filter
      </button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm text-slate-600">
        <thead class="bg-slate-50 text-xs uppercase font-semibold text-slate-500 border-b border-slate-200">
          <tr>
            <th class="px-6 py-4">Appointment</th>
            <th class="px-6 py-4">Doctor</th>
            <th class="px-6 py-4">Date & Time</th>
            <th class="px-6 py-4">Type</th>
            <th class="px-6 py-4">Status</th>
            <th class="px-6 py-4 text-right">Actions</th>
          </tr>
        </thead>

        <tbody class="divide-y divide-slate-100">
          <tr *ngFor="let apt of appointments" class="hover:bg-slate-50/50 transition-colors">
            <td class="px-6 py-4">
              <p class="font-bold text-slate-900">{{ apt.patient }}</p>
              <p class="text-xs text-slate-500">{{ apt.id }}</p>
            </td>

            <td class="px-6 py-4">
              <p class="font-medium text-slate-900">{{ apt.doctor }}</p>
              <p class="text-xs text-slate-500">{{ apt.specialty }}</p>
            </td>

            <td class="px-6 py-4">
              <p class="font-medium text-slate-900">{{ apt.date }}</p>
              <p class="text-xs text-slate-500">{{ apt.time }}</p>
            </td>

            <td class="px-6 py-4">
              <div class="flex items-center gap-1.5 text-slate-700">
                <lucide-icon
                  [img]="apt.type === 'Video Consult' ? VideoIcon : MapPinIcon"
                  class="h-4 w-4"
                  [ngClass]="apt.type === 'Video Consult' ? 'text-medical-500' : 'text-blue-500'"
                ></lucide-icon>
                <span class="font-medium">{{ apt.type }}</span>
              </div>
            </td>

            <td class="px-6 py-4">
              <app-status-badge [status]="apt.status"></app-status-badge>
            </td>

            <td class="px-6 py-4 text-right">
              <button class="border border-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">
                View
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
