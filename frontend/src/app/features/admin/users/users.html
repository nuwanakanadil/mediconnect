<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Manage Users</h1>
    <p class="text-slate-500 text-sm mt-1">View and manage patient, doctor, and admin accounts.</p>
  </div>

  <div class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden">
    <div class="p-4 border-b border-slate-100">
      <div class="relative max-w-sm">
        <lucide-icon [img]="SearchIcon" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400"></lucide-icon>
        <input type="text" placeholder="Search users..." class="w-full pl-12 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-medical-500" />
      </div>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm text-slate-600">
        <thead class="bg-slate-50 text-xs uppercase font-semibold text-slate-500 border-b border-slate-200">
          <tr>
            <th class="px-6 py-4">User</th>
            <th class="px-6 py-4">Role</th>
            <th class="px-6 py-4">Joined</th>
            <th class="px-6 py-4">Status</th>
            <th class="px-6 py-4 text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <tr *ngFor="let u of users" class="hover:bg-slate-50/50 transition-colors">
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-full bg-slate-100 text-slate-700 flex items-center justify-center border border-slate-200">
                  <lucide-icon [img]="u.role === 'doctor' ? UserIcon : UsersIcon" class="h-4 w-4"></lucide-icon>
                </div>
                <p class="font-medium text-slate-900">{{ u.name }}</p>
              </div>
            </td>
            <td class="px-6 py-4 capitalize">{{ u.role }}</td>
            <td class="px-6 py-4">{{ u.joined }}</td>
            <td class="px-6 py-4">
              <span class="px-2.5 py-1 rounded-full text-xs font-semibold"
                [ngClass]="u.status === 'active' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-700'">
                {{ u.status }}
              </span>
            </td>
            <td class="px-6 py-4 text-right">
              <button class="border border-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">
                Manage
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
