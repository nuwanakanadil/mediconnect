<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Analytics</h1>
    <p class="text-slate-500 text-sm mt-1">Track appointments, revenue, specialty demand, and platform trends.</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <div class="bg-white p-6 rounded-2xl shadow-card border border-slate-100">
      <div class="flex items-center gap-3 mb-2">
        <lucide-icon [img]="CalendarIcon" class="h-5 w-5 text-blue-600"></lucide-icon>
        <p class="text-sm font-medium text-slate-500">Appointments / Month</p>
      </div>
      <p class="text-3xl font-bold text-slate-900">12,948</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-card border border-slate-100">
      <div class="flex items-center gap-3 mb-2">
        <lucide-icon [img]="DollarSignIcon" class="h-5 w-5 text-amber-600"></lucide-icon>
        <p class="text-sm font-medium text-slate-500">Revenue / Month</p>
      </div>
      <p class="text-3xl font-bold text-slate-900">$84,220</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-card border border-slate-100">
      <div class="flex items-center gap-3 mb-2">
        <lucide-icon [img]="UsersIcon" class="h-5 w-5 text-emerald-600"></lucide-icon>
        <p class="text-sm font-medium text-slate-500">Active Patients</p>
      </div>
      <p class="text-3xl font-bold text-slate-900">8,214</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-card border border-slate-100">
      <div class="flex items-center gap-3 mb-2">
        <lucide-icon [img]="TrendingUpIcon" class="h-5 w-5 text-purple-600"></lucide-icon>
        <p class="text-sm font-medium text-slate-500">Growth Rate</p>
      </div>
      <p class="text-3xl font-bold text-slate-900">14%</p>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 bg-white rounded-2xl shadow-card border border-slate-100 p-6">
      <div class="flex items-center gap-3 mb-6">
        <lucide-icon [img]="BarChart3Icon" class="h-5 w-5 text-medical-600"></lucide-icon>
        <h2 class="text-lg font-bold text-slate-900">Appointment Trend</h2>
      </div>
      <div class="h-72 rounded-2xl border border-dashed border-slate-200 bg-slate-50 flex items-center justify-center text-slate-400">
        Chart Placeholder
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-card border border-slate-100 p-6">
      <div class="flex items-center gap-3 mb-6">
        <lucide-icon [img]="PieChartIcon" class="h-5 w-5 text-medical-600"></lucide-icon>
        <h2 class="text-lg font-bold text-slate-900">Top Specialties</h2>
      </div>

      <div class="space-y-4">
        <div *ngFor="let s of specialties" class="flex items-center justify-between">
          <div>
            <p class="font-medium text-slate-900 text-sm">{{ s.name }}</p>
            <p class="text-xs text-slate-500">{{ s.count }} bookings</p>
          </div>
          <div class="w-24 h-2 bg-slate-100 rounded-full overflow-hidden">
            <div class="h-full bg-medical-500 rounded-full" [style.width.%]="(s.count / 420) * 100"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
