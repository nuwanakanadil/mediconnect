<div class="max-w-4xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Doctor Profile</h1>
    <p class="text-slate-500 text-sm mt-1">Manage your professional details and account settings.</p>
  </div>

  <div class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden">
    <div class="p-6 sm:p-8 border-b border-slate-100 flex flex-col sm:flex-row items-center gap-6">
      <div class="relative">
        <div class="h-24 w-24 rounded-full bg-medical-100 text-medical-600 flex items-center justify-center font-bold text-3xl border-4 border-white shadow-md">
          SS
        </div>
        <button class="absolute bottom-0 right-0 bg-white border border-slate-200 p-1.5 rounded-full text-slate-600 hover:text-medical-600 shadow-sm">
          <lucide-icon [img]="UserIcon" class="h-4 w-4"></lucide-icon>
        </button>
      </div>
      <div class="text-center sm:text-left">
        <div class="flex items-center gap-3 justify-center sm:justify-start mb-1">
          <h2 class="text-2xl font-bold text-slate-900">Dr. Sarah Smith</h2>
          <span class="bg-emerald-50 text-emerald-700 border border-emerald-100 px-2 py-1 rounded-md text-xs font-bold uppercase tracking-wider">
            Verified
          </span>
        </div>
        <p class="text-slate-500">Cardiology • Metro General Hospital</p>
      </div>
    </div>

    <div class="p-6 sm:p-8">
      <form class="space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">First Name</label>
            <input type="text" value="Sarah" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Last Name</label>
            <input type="text" value="Smith" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
            <div class="relative">
              <lucide-icon [img]="MailIcon" class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"></lucide-icon>
              <input type="email" value="sarah.smith@example.com" class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone Number</label>
            <div class="relative">
              <lucide-icon [img]="PhoneIcon" class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"></lucide-icon>
              <input type="tel" value="+1 (555) 987-4321" class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Specialty</label>
            <div class="relative">
              <lucide-icon [img]="StethoscopeIcon" class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"></lucide-icon>
              <input type="text" value="Cardiology" class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Hospital / Clinic</label>
            <div class="relative">
              <lucide-icon [img]="BriefcaseIcon" class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"></lucide-icon>
              <input type="text" value="Metro General Hospital" class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500" />
            </div>
          </div>
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Professional Bio</label>
            <textarea class="w-full px-4 py-3 h-32 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 resize-none">Board-certified cardiologist with over 15 years of clinical experience in preventive cardiology and non-invasive diagnostic care.</textarea>
          </div>
        </div>

        <div class="pt-6 flex justify-end">
          <button
            type="button"
            class="bg-medical-600 text-white px-6 py-2.5 rounded-xl font-medium hover:bg-medical-700 transition-colors shadow-sm flex items-center gap-2"
          >
            <lucide-icon [img]="SaveIcon" class="h-4 w-4"></lucide-icon>
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
