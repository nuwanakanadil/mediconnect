<div class="space-y-6">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Availability Schedule</h1>
      <p class="text-slate-500 mt-1">Set your working hours and capacity per day.</p>
    </div>

    <button (click)="saveSchedule()" class="bg-gradient-to-r from-medical-600 to-medical-500 text-white px-6 py-2.5 rounded-xl font-bold hover:from-medical-700 hover:to-medical-600 transition-all shadow-md flex items-center gap-2 transform hover:-translate-y-0.5">
      <lucide-icon [img]="SaveIcon" class="h-4 w-4"></lucide-icon>
      Save Schedule
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden lg:flex min-h-[500px]">
    <!-- left Sidebar: Days Menu -->
    <div class="w-full lg:w-64 bg-slate-50 border-r border-slate-100 flex flex-col p-4 space-y-2">
      <button 
        *ngFor="let day of days" 
        (click)="selectedDay = day.value"
        class="flex items-center justify-between w-full px-4 py-3 rounded-xl font-bold transition-all"
        [ngClass]="selectedDay === day.value ? 'bg-white text-medical-600 shadow-sm border border-slate-200' : 'text-slate-600 hover:bg-slate-100/50'"
      >
        <span>{{ day.display }}</span>
        <!-- Optional indicator if they have schedule -->
        <div *ngIf="false" class="w-2 h-2 rounded-full bg-emerald-400"></div>
      </button>
    </div>

    <!-- Right Area: Time Slot Manager -->
    <div class="flex-1 p-6 sm:p-8 bg-white relative">
      <h2 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
        <lucide-icon [img]="CalendarIcon" class="h-5 w-5 text-medical-500"></lucide-icon>
        {{ selectedDay }} Schedule
      </h2>

      <div class="space-y-4">
        <div *ngIf="schedulesForDay.length === 0" class="flex flex-col items-center justify-center py-12 text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl">
          <lucide-icon [img]="CalendarIcon" class="h-12 w-12 mb-3 text-slate-300"></lucide-icon>
          <p class="font-semibold text-slate-600 text-lg">You are unavailable on {{ selectedDay }}</p>
          <p class="text-sm">Add a block of working hours below.</p>
        </div>

        <div *ngFor="let slot of schedulesForDay" class="flex items-center gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm animate-in fade-in slide-in-from-bottom-2">
           <div class="space-y-1 flex-1">
             <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Start Time</label>
             <input type="time" [(ngModel)]="slot.startTime" class="w-full px-3 py-2 border rounded-lg bg-white" />
           </div>
           <div class="flex items-center pt-5 text-slate-400 font-bold self-center">-</div>
           <div class="space-y-1 flex-1">
             <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">End Time</label>
             <input type="time" [(ngModel)]="slot.endTime" class="w-full px-3 py-2 border rounded-lg bg-white" />
           </div>
           <div class="space-y-1 w-24">
             <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" title="Max Appointments">Max Pts</label>
             <input type="number" [(ngModel)]="slot.maxAppointments" class="w-full px-3 py-2 border rounded-lg bg-white" />
           </div>
           <div class="pt-5">
             <button (click)="removeTimeSlot(slot)" class="p-2.5 text-rose-500 hover:bg-rose-100 rounded-lg transition-colors">
               <lucide-icon [img]="Trash2Icon" class="h-5 w-5"></lucide-icon>
             </button>
           </div>
        </div>

        <div class="pt-4">
          <button (click)="addTimeSlot()" class="flex items-center gap-2 text-medical-600 font-bold hover:text-medical-700 bg-medical-50 px-4 py-2.5 rounded-xl border border-medical-100 transition-colors">
            <lucide-icon [img]="PlusIcon" class="h-4 w-4"></lucide-icon> Add Working Hours
          </button>
        </div>
      </div>
      
    </div>
  </div>
</div>
