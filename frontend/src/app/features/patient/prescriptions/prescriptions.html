<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Digital Prescriptions</h1>
    <p class="text-slate-500 text-sm mt-1">
      View and download your prescribed medications.
    </p>
  </div>

  <div class="grid grid-cols-1 gap-6 animate-stagger">
    <div
      *ngFor="let rx of prescriptions"
      class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden"
    >
      <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div class="flex items-center gap-4">
          <div class="bg-medical-100 p-3 rounded-xl text-medical-600">
            <lucide-icon [img]="PillIcon" class="h-6 w-6"></lucide-icon>
          </div>
          <div>
            <div class="flex items-center gap-3 mb-1">
              <h2 class="text-lg font-bold text-slate-900">{{ rx.id }}</h2>
              <app-status-badge [status]="rx.status"></app-status-badge>
            </div>
            <div class="flex items-center gap-4 text-sm text-slate-500">
              <span class="flex items-center gap-1">
                <lucide-icon [img]="CalendarIcon" class="h-4 w-4"></lucide-icon>
                {{ rx.date }}
              </span>
              <span class="flex items-center gap-1">
                <lucide-icon [img]="UserIcon" class="h-4 w-4"></lucide-icon>
                {{ rx.doctor }}
              </span>
            </div>
          </div>
        </div>
        <button class="flex items-center gap-2 bg-white border border-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors shadow-sm w-full sm:w-auto justify-center">
          <lucide-icon [img]="DownloadIcon" class="h-4 w-4"></lucide-icon>
          Download PDF
        </button>
      </div>

      <div class="p-6">
        <h3 class="text-sm font-semibold text-slate-900 uppercase tracking-wider mb-4">
          Prescribed Medications
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <div
            *ngFor="let med of rx.medications"
            class="border border-slate-100 rounded-xl p-4 flex items-start gap-3"
          >
            <lucide-icon
              [img]="CheckCircle2Icon"
              class="h-5 w-5 text-emerald-500 flex-shrink-0 mt-0.5"
            ></lucide-icon>
            <div>
              <p class="font-bold text-slate-900">
                {{ med.name }}
                <span class="text-medical-600 font-medium text-sm ml-1">
                  {{ med.dosage }}
                </span>
              </p>
              <p class="text-sm text-slate-600 mt-1">{{ med.frequency }}</p>
              <p class="text-xs text-slate-400 mt-1">Duration: {{ med.duration }}</p>
            </div>
          </div>
        </div>

        <div class="bg-amber-50 border border-amber-100 rounded-xl p-4">
          <h4 class="text-xs font-bold text-amber-800 uppercase tracking-wider mb-1">
            Doctor's Notes
          </h4>
          <p class="text-sm text-amber-900">{{ rx.notes }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
