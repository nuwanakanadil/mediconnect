<div class="max-w-4xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Profile Settings</h1>
    <p class="text-slate-500 text-sm mt-1">
      Manage your personal information and medical history.
    </p>
  </div>

  <div *ngIf="loading" class="flex justify-center items-center h-64">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-medical-600"></div>
  </div>

  <div *ngIf="!loading" class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden">
    <div class="p-6 sm:p-8 border-b border-slate-100 flex flex-col sm:flex-row items-center gap-6">
      <div class="relative">
        <div class="h-24 w-24 rounded-full bg-medical-100 text-medical-600 flex items-center justify-center font-bold text-3xl border-4 border-white shadow-md">
          {{ getInitials() }}
        </div>
        <button class="absolute bottom-0 right-0 bg-white border border-slate-200 p-1.5 rounded-full text-slate-600 hover:text-medical-600 shadow-sm">
          <lucide-icon [img]="UserIcon" class="h-4 w-4"></lucide-icon>
        </button>
      </div>
      <div class="text-center sm:text-left">
        <h2 class="text-2xl font-bold text-slate-900">{{ patient?.fullName }}</h2>
        <p class="text-slate-500">Patient ID: PT-{{ patient?.id?.toString()?.padStart(4, '0') || '0000' }}</p>
      </div>
    </div>

    <div class="p-6 sm:p-8">
      <div *ngIf="successMessage" class="mb-6 p-4 bg-emerald-50 text-emerald-700 rounded-xl border border-emerald-100 flex items-center gap-3">
        <span class="text-sm font-medium">{{ successMessage }}</span>
      </div>
      <div *ngIf="errorMessage" class="mb-6 p-4 bg-rose-50 text-rose-700 rounded-xl border border-rose-100 flex items-center gap-3">
        <span class="text-sm font-medium">{{ errorMessage }}</span>
      </div>

      <h3 class="text-lg font-bold text-slate-900 mb-6">Personal Information</h3>

      <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Full Name
            </label>
            <input
              type="text"
              formControlName="fullName"
              class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Email Address
            </label>
            <div class="relative">
              <lucide-icon
                [img]="MailIcon"
                class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"
              ></lucide-icon>
              <input
                type="email"
                formControlName="email"
                class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none cursor-not-allowed opacity-70"
              />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Phone Number
            </label>
            <div class="relative">
              <lucide-icon
                [img]="PhoneIcon"
                class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"
              ></lucide-icon>
              <input
                type="tel"
                formControlName="phone"
                class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
              />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Date of Birth
            </label>
            <input
              type="date"
              formControlName="dateOfBirth"
              class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-slate-700"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Gender
            </label>
            <select formControlName="gender" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-slate-700">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Address
            </label>
            <textarea
              formControlName="address"
              rows="3"
              class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
            ></textarea>
          </div>
        </div>

        <div class="pt-6 border-t border-slate-100">
          <h3 class="text-lg font-bold text-slate-900 mb-6">Medical Profile</h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">
                Blood Group
              </label>
              <select
                formControlName="bloodGroup"
                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-slate-700"
              >
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">
                Emergency Contact Name
              </label>
              <input
                type="text"
                formControlName="emergencyContactName"
                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">
                Emergency Contact Phone
              </label>
              <input
                type="text"
                formControlName="emergencyContactPhone"
                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
              />
            </div>
          </div>
        </div>

        <div class="pt-6 flex justify-end">
          <button
            type="submit"
            [disabled]="profileForm.invalid || saving"
            class="bg-medical-600 text-white px-6 py-2.5 rounded-xl font-medium hover:bg-medical-700 transition-colors shadow-sm flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <lucide-icon [img]="SaveIcon" class="h-4 w-4" *ngIf="!saving"></lucide-icon>
            <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white" *ngIf="saving"></div>
            {{ saving ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
