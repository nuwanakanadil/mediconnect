<div class="max-w-4xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">Profile Settings</h1>
    <p class="text-slate-500 text-sm mt-1">
      Manage your personal information and medical history.
    </p>
  </div>

  <div class="bg-white rounded-2xl shadow-card border border-slate-100 overflow-hidden">
    <div class="p-6 sm:p-8 border-b border-slate-100 flex flex-col sm:flex-row items-center gap-6">
      <div class="relative">
        <div class="h-24 w-24 rounded-full bg-medical-100 text-medical-600 flex items-center justify-center font-bold text-3xl border-4 border-white shadow-md">
          AJ
        </div>
        <button class="absolute bottom-0 right-0 bg-white border border-slate-200 p-1.5 rounded-full text-slate-600 hover:text-medical-600 shadow-sm">
          <lucide-icon [img]="UserIcon" class="h-4 w-4"></lucide-icon>
        </button>
      </div>
      <div class="text-center sm:text-left">
        <h2 class="text-2xl font-bold text-slate-900">Alex Johnson</h2>
        <p class="text-slate-500">Patient ID: PT-2023-8492</p>
      </div>
    </div>

    <div class="p-6 sm:p-8">
      <h3 class="text-lg font-bold text-slate-900 mb-6">Personal Information</h3>

      <form class="space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              First Name
            </label>
            <input
              type="text"
              value="Alex"
              class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Last Name
            </label>
            <input
              type="text"
              value="Johnson"
              class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Email Address
            </label>
            <div class="relative">
              <lucide-icon
                [img]="MailIcon"
                class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"
              ></lucide-icon>
              <input
                type="email"
                value="alex.j@example.com"
                class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
              />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Phone Number
            </label>
            <div class="relative">
              <lucide-icon
                [img]="PhoneIcon"
                class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"
              ></lucide-icon>
              <input
                type="tel"
                value="+1 (555) 123-4567"
                class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
              />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Date of Birth
            </label>
            <input
              type="date"
              value="1990-05-15"
              class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-slate-700"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">
              Gender
            </label>
            <select class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-slate-700">
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="pt-6 border-t border-slate-100">
          <h3 class="text-lg font-bold text-slate-900 mb-6">Medical Profile</h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">
                Blood Type
              </label>
              <select
                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500 text-slate-700"
              >
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option selected>O+</option>
                <option>O-</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">
                Known Allergies
              </label>
              <input
                type="text"
                value="Penicillin, Peanuts"
                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
              />
            </div>
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-slate-700 mb-1.5">
                Current Medications
              </label>
              <input
                type="text"
                value="Lisinopril 10mg"
                class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-medical-500"
              />
            </div>
          </div>
        </div>

        <div class="pt-6 flex justify-end">
          <button
            type="button"
            class="bg-medical-600 text-white px-6 py-2.5 rounded-xl font-medium hover:bg-medical-700 transition-colors shadow-sm flex items-center gap-2"
          >
            <lucide-icon [img]="SaveIcon" class="h-4 w-4"></lucide-icon>
            Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
