<div class="min-h-screen bg-slate-100 flex flex-col items-center justify-center px-4">
  <a routerLink="/" class="flex items-center gap-2 mb-5">
    <div class="bg-medical-600 p-1.5 rounded-lg">
      <lucide-icon [img]="HeartPulseIcon" class="h-4 w-4 text-white"></lucide-icon>
    </div>
    <span class="text-[20px] font-bold text-slate-900 tracking-tight">MediConnect</span>
  </a>

  <div class="w-full max-w-[450px] rounded-[18px] bg-white border border-slate-200 shadow-card px-8 py-8">
    <div class="text-center mb-7">
      <h1 class="text-[28px] font-bold text-slate-900 mb-3 leading-none">
        Reset Password
      </h1>
      <p class="text-[14px] leading-7 text-slate-500">
        Enter your email address and we'll send you a link to<br />
        reset your password.
      </p>
    </div>

    <form class="space-y-6">
      <div>
        <label class="block text-[14px] font-semibold text-slate-700 mb-2.5">
          Email Address
        </label>

        <div class="relative">
          <lucide-icon
            [img]="MailIcon"
            class="absolute left-4 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-400"
          ></lucide-icon>

          <input
            type="email"
            placeholder="name@example.com"
            class="w-full h-11 pl-12 pr-4 text-[14px] bg-slate-50 border border-slate-200 rounded-[14px] focus:outline-none focus:ring-2 focus:ring-medical-500 focus:bg-white transition-colors"
          />
        </div>
      </div>

      <button
        type="button"
        class="w-full h-11 bg-medical-600 text-white rounded-[14px] text-[14px] font-bold hover:bg-medical-700 transition-colors"
      >
        Send Reset Link
      </button>
    </form>

    <div class="mt-7 text-center">
      <a
        routerLink="/login"
        class="inline-flex items-center gap-2 text-[14px] text-slate-600 hover:text-slate-800 font-medium"
      >
        <lucide-icon [img]="ArrowLeftIcon" class="h-4 w-4"></lucide-icon>
        Back to log in
      </a>
    </div>
  </div>
</div>
